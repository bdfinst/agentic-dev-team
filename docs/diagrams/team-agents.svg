<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Orchestrator (center top) -->
  <g filter="url(#shadow)">
    <rect x="295" y="16" width="190" height="52" rx="12" fill="#6366F1" stroke="#4F46E5" stroke-width="1"/>
    <text x="390" y="47" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">Orchestrator</text>
  </g>

  <!-- Connection lines from Orchestrator -->
  <!-- Left column agents -->
  <line x1="340" y1="68" x2="120" y2="120" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="350" y1="68" x2="120" y2="200" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="340" y1="68" x2="120" y2="280" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="350" y1="68" x2="120" y2="360" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Center column agents -->
  <line x1="390" y1="68" x2="390" y2="120" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Right column agents -->
  <line x1="430" y1="68" x2="660" y2="120" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="440" y1="68" x2="660" y2="200" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="430" y1="68" x2="660" y2="280" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="440" y1="68" x2="660" y2="360" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Left Column -->
  <!-- Software Engineer -->
  <g filter="url(#shadow)">
    <rect x="20" y="104" width="200" height="48" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <rect x="20" y="104" width="5" height="48" rx="2.5" fill="#10B981"/>
    <text x="120" y="133" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">Software Engineer</text>
  </g>

  <!-- Data Scientist -->
  <g filter="url(#shadow)">
    <rect x="20" y="184" width="200" height="48" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="20" y="184" width="5" height="48" rx="2.5" fill="#8B5CF6"/>
    <text x="120" y="213" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">Data Scientist</text>
  </g>

  <!-- Architect -->
  <g filter="url(#shadow)">
    <rect x="20" y="264" width="200" height="48" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="20" y="264" width="5" height="48" rx="2.5" fill="#3B82F6"/>
    <text x="120" y="293" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">Architect</text>
  </g>

  <!-- QA Engineer -->
  <g filter="url(#shadow)">
    <rect x="20" y="344" width="200" height="48" rx="12" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
    <rect x="20" y="344" width="5" height="48" rx="2.5" fill="#EC4899"/>
    <text x="120" y="373" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">QA / SQA Engineer</text>
  </g>

  <!-- Center Column -->
  <!-- Product Manager -->
  <g filter="url(#shadow)">
    <rect x="290" y="120" width="200" height="48" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
    <rect x="290" y="120" width="5" height="48" rx="2.5" fill="#F97316"/>
    <text x="390" y="149" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">Product Manager</text>
  </g>

  <!-- ADR Author -->
  <line x1="390" y1="68" x2="390" y2="200" stroke="#CBD5E1" stroke-width="1.5"/>
  <g filter="url(#shadow)">
    <rect x="290" y="200" width="200" height="48" rx="12" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
    <rect x="290" y="200" width="5" height="48" rx="2.5" fill="#0EA5E9"/>
    <text x="390" y="229" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">ADR Author</text>
  </g>

  <!-- Right Column -->
  <!-- UI/UX Designer -->
  <g filter="url(#shadow)">
    <rect x="560" y="104" width="200" height="48" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="560" y="104" width="5" height="48" rx="2.5" fill="#F59E0B"/>
    <text x="660" y="133" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">UI/UX Designer</text>
  </g>

  <!-- Technical Writer -->
  <g filter="url(#shadow)">
    <rect x="560" y="184" width="200" height="48" rx="12" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
    <rect x="560" y="184" width="5" height="48" rx="2.5" fill="#64748B"/>
    <text x="660" y="213" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">Technical Writer</text>
  </g>

  <!-- Security Engineer -->
  <g filter="url(#shadow)">
    <rect x="560" y="264" width="200" height="48" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
    <rect x="560" y="264" width="5" height="48" rx="2.5" fill="#EF4444"/>
    <text x="660" y="293" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">Security Engineer</text>
  </g>

  <!-- DevOps/SRE -->
  <g filter="url(#shadow)">
    <rect x="560" y="344" width="200" height="48" rx="12" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5"/>
    <rect x="560" y="344" width="5" height="48" rx="2.5" fill="#14B8A6"/>
    <text x="660" y="373" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">DevOps / SRE</text>
  </g>

  <!-- Collaboration lines (dashed, between peers) -->
  <!-- SE <-> QA -->
  <line x1="60" y1="152" x2="60" y2="344" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- SE <-> Architect -->
  <line x1="220" y1="140" x2="220" y2="276" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Architect <-> Security -->
  <line x1="220" y1="288" x2="560" y2="288" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- SE <-> DevOps -->
  <line x1="220" y1="128" x2="560" y2="368" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- PM <-> TW -->
  <line x1="490" y1="156" x2="560" y2="200" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <line x1="280" y1="440" x2="310" y2="440" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="315" y="444" font-size="10" fill="#94A3B8">reports to</text>
  <line x1="410" y1="440" x2="440" y2="440" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="445" y="444" font-size="10" fill="#94A3B8">collaborates</text>
</svg>