<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#F43F5E"/>
    </marker>
  </defs>

  <!-- User Request -->
  <g filter="url(#shadow)">
    <rect x="215" y="12" width="170" height="44" rx="22" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="300" y="39" text-anchor="middle" font-size="13" font-weight="500" fill="#475569">User Request</text>
  </g>

  <!-- Arrow -->
  <line x1="300" y1="56" x2="300" y2="78" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Orchestrator -->
  <g filter="url(#shadow)">
    <rect x="195" y="82" width="210" height="52" rx="12" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
    <rect x="195" y="82" width="5" height="52" rx="2.5" fill="#6366F1"/>
    <text x="300" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Orchestrator</text>
  </g>

  <!-- Branches from Orchestrator -->
  <line x1="240" y1="134" x2="240" y2="165" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="134" x2="360" y2="165" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Model Routing -->
  <g filter="url(#shadow)">
    <rect x="135" y="170" width="210" height="48" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="135" y="170" width="5" height="48" rx="2.5" fill="#8B5CF6"/>
    <text x="240" y="199" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">Model Routing Table</text>
  </g>

  <!-- Agent Selection -->
  <g filter="url(#shadow)">
    <rect x="255" y="170" width="210" height="48" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="255" y="170" width="5" height="48" rx="2.5" fill="#3B82F6"/>
    <text x="360" y="199" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">Agent Selection</text>
  </g>

  <!-- Merge arrows down -->
  <line x1="240" y1="218" x2="300" y2="248" stroke="#94A3B8" stroke-width="2"/>
  <line x1="360" y1="218" x2="300" y2="248" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Task Execution -->
  <g filter="url(#shadow)">
    <rect x="190" y="252" width="220" height="52" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <rect x="190" y="252" width="5" height="52" rx="2.5" fill="#10B981"/>
    <text x="300" y="274" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">Task Execution</text>
    <text x="300" y="292" text-anchor="middle" font-size="11" fill="#64748B">Coding Agent</text>
  </g>

  <!-- Arrow down -->
  <line x1="300" y1="304" x2="300" y2="330" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Inline Review -->
  <g filter="url(#shadow)">
    <rect x="170" y="334" width="260" height="52" rx="12" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
    <rect x="170" y="334" width="5" height="52" rx="2.5" fill="#EC4899"/>
    <text x="300" y="356" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">Inline Review Checkpoint</text>
    <text x="300" y="374" text-anchor="middle" font-size="11" fill="#64748B">Targeted Review Agents</text>
  </g>

  <!-- Fail loop back -->
  <path d="M170,360 C100,360 100,278 190,278" stroke="#F43F5E" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="95" y="315" text-anchor="middle" font-size="10" fill="#F43F5E">fail</text>
  <text x="95" y="328" text-anchor="middle" font-size="9" fill="#F43F5E">(max 5x)</text>

  <!-- Escalate -->
  <line x1="430" y1="360" x2="490" y2="360" stroke="#F43F5E" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <g filter="url(#shadow)">
    <rect x="490" y="340" width="100" height="40" rx="20" fill="#FEF2F2" stroke="#F43F5E" stroke-width="1.5"/>
    <text x="540" y="365" text-anchor="middle" font-size="11" font-weight="500" fill="#DC2626">Escalate</text>
  </g>
  <text x="460" y="352" text-anchor="middle" font-size="9" fill="#F43F5E">still fail</text>

  <!-- Pass arrow down -->
  <line x1="300" y1="386" x2="300" y2="415" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="404" font-size="10" fill="#10B981">pass / warn</text>

  <!-- Learning Loop -->
  <g filter="url(#shadow)">
    <rect x="195" y="420" width="210" height="48" rx="12" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
    <rect x="195" y="420" width="5" height="48" rx="2.5" fill="#64748B"/>
    <text x="300" y="449" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">Learning Loop</text>
  </g>

  <!-- Loop back to orchestrator -->
  <path d="M405,444 C520,444 520,108 405,108" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>