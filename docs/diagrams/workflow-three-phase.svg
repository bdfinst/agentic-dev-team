<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#F43F5E"/>
    </marker>
  </defs>

  <!-- User Request + Orchestrator (compact top) -->
  <g filter="url(#shadow)">
    <rect x="370" y="6" width="160" height="32" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="450" y="27" text-anchor="middle" font-size="12" font-weight="500" fill="#475569">User Request</text>
  </g>
  <line x1="450" y1="38" x2="450" y2="48" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="370" y="52" width="160" height="36" rx="12" fill="#6366F1" stroke="#4F46E5" stroke-width="1"/>
    <text x="450" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#FFF">Orchestrator</text>
  </g>
  <line x1="450" y1="88" x2="450" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 1: RESEARCH ===== -->
  <rect x="20" y="104" width="860" height="78" rx="14" fill="#F5F3FF" fill-opacity="0.5" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="120" font-size="10" font-weight="700" fill="#7C3AED" letter-spacing="0.5">PHASE 1 — RESEARCH</text>

  <!-- /specs -->
  <g filter="url(#shadow)">
    <rect x="40" y="128" width="200" height="42" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="40" y="128" width="4" height="42" rx="2" fill="#8B5CF6"/>
    <text x="140" y="147" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">/specs</text>
    <text x="140" y="162" text-anchor="middle" font-size="9" fill="#64748B">Intent · BDD · Architecture · Criteria</text>
  </g>
  <line x1="240" y1="149" x2="268" y2="149" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Design Doc -->
  <g filter="url(#shadow)">
    <rect x="272" y="128" width="160" height="42" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="272" y="128" width="4" height="42" rx="2" fill="#8B5CF6"/>
    <text x="352" y="147" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Design Doc</text>
    <text x="352" y="162" text-anchor="middle" font-size="9" fill="#64748B">docs/specs/</text>
  </g>
  <line x1="432" y1="149" x2="460" y2="149" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Human Gate 1 (inline with phase 1) -->
  <g filter="url(#shadow)">
    <rect x="464" y="131" width="280" height="36" rx="18" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="604" y="154" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Human Gate — approve spec + design</text>
  </g>

  <!-- Arrow down from Gate 1 to Phase 2 -->
  <line x1="604" y1="167" x2="450" y2="196" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 2: PLAN ===== -->
  <rect x="20" y="200" width="860" height="118" rx="14" fill="#EFF6FF" fill-opacity="0.4" stroke="#3B82F6" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="216" font-size="10" font-weight="700" fill="#2563EB" letter-spacing="0.5">PHASE 2 — PLAN</text>

  <!-- /plan -->
  <g filter="url(#shadow)">
    <rect x="40" y="224" width="120" height="38" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="40" y="224" width="4" height="38" rx="2" fill="#3B82F6"/>
    <text x="100" y="241" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">/plan</text>
    <text x="100" y="254" text-anchor="middle" font-size="9" fill="#64748B">TDD steps</text>
  </g>
  <line x1="160" y1="243" x2="180" y2="243" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Plan Review Personas (4 in parallel) -->
  <g filter="url(#shadow)">
    <rect x="184" y="224" width="110" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="239" y="239" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">Acceptance</text>
    <text x="239" y="251" text-anchor="middle" font-size="8" fill="#3B82F6">criteria · scenarios</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="300" y="224" width="110" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="355" y="239" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">Design</text>
    <text x="355" y="251" text-anchor="middle" font-size="8" fill="#3B82F6">coupling · patterns</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="184" y="264" width="110" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="239" y="279" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">UX</text>
    <text x="239" y="291" text-anchor="middle" font-size="8" fill="#3B82F6">journey · a11y</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="300" y="264" width="110" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="355" y="279" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">Strategic</text>
    <text x="355" y="291" text-anchor="middle" font-size="8" fill="#3B82F6">scope · risk</text>
  </g>

  <!-- Converge to aggregate -->
  <line x1="294" y1="258" x2="438" y2="262" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="410" y1="250" x2="438" y2="262" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="294" y1="275" x2="438" y2="262" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="410" y1="275" x2="438" y2="262" stroke="#CBD5E1" stroke-width="1"/>

  <g filter="url(#shadow)">
    <rect x="442" y="244" width="140" height="36" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
    <text x="512" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Aggregate</text>
    <text x="512" y="273" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Findings</text>
  </g>
  <line x1="582" y1="262" x2="608" y2="262" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Human Gate 2 (inline with aggregate) -->
  <g filter="url(#shadow)">
    <rect x="612" y="244" width="250" height="36" rx="18" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="737" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Human Gate — approve plan</text>
  </g>

  <!-- Arrow down from Gate 2 to Phase 3 -->
  <line x1="737" y1="280" x2="450" y2="332" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 3: IMPLEMENT ===== -->
  <rect x="20" y="336" width="860" height="88" rx="14" fill="#ECFDF5" fill-opacity="0.4" stroke="#10B981" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="352" font-size="10" font-weight="700" fill="#059669" letter-spacing="0.5">PHASE 3 — IMPLEMENT</text>

  <!-- TDD Loop -->
  <g filter="url(#shadow)">
    <rect x="40" y="360" width="140" height="44" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <rect x="40" y="360" width="4" height="44" rx="2" fill="#10B981"/>
    <text x="110" y="378" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">TDD Loop</text>
    <text x="110" y="394" text-anchor="middle" font-size="9">
      <tspan fill="#EF4444" font-weight="600">RED</tspan>
      <tspan fill="#64748B"> → </tspan>
      <tspan fill="#22C55E" font-weight="600">GREEN</tspan>
      <tspan fill="#64748B"> → </tspan>
      <tspan fill="#3B82F6" font-weight="600">REFACTOR</tspan>
    </text>
  </g>
  <line x1="180" y1="382" x2="202" y2="382" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Spec Compliance -->
  <g filter="url(#shadow)">
    <rect x="206" y="360" width="120" height="44" rx="10" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
    <rect x="206" y="360" width="4" height="44" rx="2" fill="#EC4899"/>
    <text x="266" y="378" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Spec Compliance</text>
    <text x="266" y="394" text-anchor="middle" font-size="9" fill="#64748B">Stage 1</text>
  </g>
  <line x1="326" y1="382" x2="348" y2="382" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Quality Agents -->
  <g filter="url(#shadow)">
    <rect x="352" y="360" width="120" height="44" rx="10" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
    <rect x="352" y="360" width="4" height="44" rx="2" fill="#EC4899"/>
    <text x="412" y="378" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Quality Agents</text>
    <text x="412" y="394" text-anchor="middle" font-size="9" fill="#64748B">Stage 2</text>
  </g>
  <line x1="472" y1="382" x2="494" y2="382" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- /code-review -->
  <g filter="url(#shadow)">
    <rect x="498" y="360" width="130" height="44" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <rect x="498" y="360" width="4" height="44" rx="2" fill="#10B981"/>
    <text x="563" y="378" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">/code-review</text>
    <text x="563" y="394" text-anchor="middle" font-size="9" fill="#64748B">auto-fix loop (5x)</text>
  </g>
  <line x1="628" y1="382" x2="650" y2="382" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Human Gate 3 (inline with phase 3) -->
  <g filter="url(#shadow)">
    <rect x="654" y="364" width="210" height="36" rx="18" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="759" y="387" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">Human Gate — approve</text>
  </g>

  <!-- Fail loop (underneath Phase 3) -->
  <path d="M412,404 C412,420 110,420 110,404" stroke="#F43F5E" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="260" y="434" text-anchor="middle" font-size="8" fill="#F43F5E">fail → auto-fix → re-run (max 5x)</text>

  <!-- Arrow down from Gate 3 to /pr and Learning -->
  <line x1="700" y1="400" x2="450" y2="460" stroke="#94A3B8" stroke-width="2"/>

  <!-- /pr and Learning Loop -->
  <line x1="390" y1="462" x2="310" y2="478" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="462" x2="580" y2="478" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="220" y="482" width="130" height="36" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
    <rect x="220" y="482" width="4" height="36" rx="2" fill="#F97316"/>
    <text x="285" y="505" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">/pr</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="545" y="482" width="150" height="36" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
    <rect x="545" y="482" width="4" height="36" rx="2" fill="#64748B"/>
    <text x="620" y="505" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">Learning Loop</text>
  </g>
</svg>