<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 740" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#F43F5E"/>
    </marker>
  </defs>

  <!-- User Request -->
  <g filter="url(#shadow)">
    <rect x="355" y="8" width="190" height="40" rx="20" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="450" y="33" text-anchor="middle" font-size="13" font-weight="500" fill="#475569">User Request</text>
  </g>
  <line x1="450" y1="48" x2="450" y2="62" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Orchestrator -->
  <g filter="url(#shadow)">
    <rect x="355" y="66" width="190" height="44" rx="12" fill="#6366F1" stroke="#4F46E5" stroke-width="1"/>
    <text x="450" y="93" text-anchor="middle" font-size="14" font-weight="600" fill="#FFF">Orchestrator</text>
  </g>
  <line x1="450" y1="110" x2="450" y2="128" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 1: RESEARCH ===== -->
  <rect x="20" y="132" width="860" height="108" rx="16" fill="#F5F3FF" fill-opacity="0.5" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="152" font-size="11" font-weight="700" fill="#7C3AED" letter-spacing="0.5">PHASE 1 — RESEARCH</text>

  <g filter="url(#shadow)">
    <rect x="250" y="160" width="180" height="52" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="250" y="160" width="5" height="52" rx="2.5" fill="#8B5CF6"/>
    <text x="340" y="183" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">/specs</text>
    <text x="340" y="200" text-anchor="middle" font-size="10" fill="#64748B">Intent · BDD · Architecture · Criteria</text>
  </g>
  <line x1="430" y1="186" x2="468" y2="186" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="472" y="160" width="180" height="52" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="472" y="160" width="5" height="52" rx="2.5" fill="#8B5CF6"/>
    <text x="562" y="183" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">Design Doc</text>
    <text x="562" y="200" text-anchor="middle" font-size="10" fill="#64748B">docs/specs/</text>
  </g>

  <!-- Human Gate 1 -->
  <line x1="450" y1="240" x2="450" y2="256" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="310" y="260" width="280" height="36" rx="18" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="450" y="283" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Human Gate — approve spec + design</text>
  </g>
  <line x1="450" y1="296" x2="450" y2="316" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 2: PLAN ===== -->
  <rect x="20" y="320" width="860" height="148" rx="16" fill="#EFF6FF" fill-opacity="0.4" stroke="#3B82F6" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="340" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="0.5">PHASE 2 — PLAN</text>

  <!-- /plan -->
  <g filter="url(#shadow)">
    <rect x="40" y="352" width="160" height="48" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="40" y="352" width="5" height="48" rx="2.5" fill="#3B82F6"/>
    <text x="120" y="374" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">/plan</text>
    <text x="120" y="390" text-anchor="middle" font-size="10" fill="#64748B">TDD steps</text>
  </g>
  <line x1="200" y1="376" x2="224" y2="376" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Plan Review Personas (4 in parallel) -->
  <g filter="url(#shadow)">
    <rect x="228" y="348" width="134" height="40" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="295" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Acceptance Critic</text>
    <text x="295" y="379" text-anchor="middle" font-size="9" fill="#3B82F6">criteria · scenarios</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="370" y="348" width="134" height="40" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="437" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Design Critic</text>
    <text x="437" y="379" text-anchor="middle" font-size="9" fill="#3B82F6">coupling · patterns</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="512" y="348" width="134" height="40" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="579" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">UX Critic</text>
    <text x="579" y="379" text-anchor="middle" font-size="9" fill="#3B82F6">journey · a11y</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="654" y="348" width="134" height="40" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="721" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Strategic Critic</text>
    <text x="721" y="379" text-anchor="middle" font-size="9" fill="#3B82F6">scope · risk</text>
  </g>

  <!-- Converge to aggregate -->
  <line x1="295" y1="388" x2="450" y2="418" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="437" y1="388" x2="450" y2="418" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="579" y1="388" x2="450" y2="418" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="721" y1="388" x2="450" y2="418" stroke="#CBD5E1" stroke-width="1"/>

  <g filter="url(#shadow)">
    <rect x="370" y="418" width="160" height="36" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
    <text x="450" y="441" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Aggregate Findings</text>
  </g>

  <!-- Human Gate 2 -->
  <line x1="450" y1="454" x2="450" y2="472" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="310" y="476" width="280" height="36" rx="18" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="450" y="499" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Human Gate — approve plan</text>
  </g>
  <line x1="450" y1="512" x2="450" y2="530" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 3: IMPLEMENT ===== -->
  <rect x="20" y="534" width="860" height="108" rx="16" fill="#ECFDF5" fill-opacity="0.4" stroke="#10B981" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="554" font-size="11" font-weight="700" fill="#059669" letter-spacing="0.5">PHASE 3 — IMPLEMENT</text>

  <!-- TDD Loop -->
  <g filter="url(#shadow)">
    <rect x="100" y="564" width="160" height="52" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <rect x="100" y="564" width="5" height="52" rx="2.5" fill="#10B981"/>
    <text x="180" y="586" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">TDD Loop</text>
    <text x="180" y="604" text-anchor="middle" font-size="10">
      <tspan fill="#EF4444" font-weight="600">RED</tspan>
      <tspan fill="#64748B"> → </tspan>
      <tspan fill="#22C55E" font-weight="600">GREEN</tspan>
      <tspan fill="#64748B"> → </tspan>
      <tspan fill="#3B82F6" font-weight="600">REFACTOR</tspan>
    </text>
  </g>
  <line x1="260" y1="590" x2="294" y2="590" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Spec Compliance -->
  <g filter="url(#shadow)">
    <rect x="298" y="564" width="140" height="52" rx="12" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
    <rect x="298" y="564" width="5" height="52" rx="2.5" fill="#EC4899"/>
    <text x="368" y="586" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Spec Compliance</text>
    <text x="368" y="604" text-anchor="middle" font-size="10" fill="#64748B">Stage 1</text>
  </g>
  <line x1="438" y1="590" x2="468" y2="590" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Quality Agents -->
  <g filter="url(#shadow)">
    <rect x="472" y="564" width="140" height="52" rx="12" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
    <rect x="472" y="564" width="5" height="52" rx="2.5" fill="#EC4899"/>
    <text x="542" y="586" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Quality Agents</text>
    <text x="542" y="604" text-anchor="middle" font-size="10" fill="#64748B">Stage 2</text>
  </g>
  <line x1="612" y1="590" x2="648" y2="590" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- /code-review -->
  <g filter="url(#shadow)">
    <rect x="652" y="564" width="160" height="52" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <rect x="652" y="564" width="5" height="52" rx="2.5" fill="#10B981"/>
    <text x="732" y="586" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">/code-review</text>
    <text x="732" y="604" text-anchor="middle" font-size="10" fill="#64748B">auto-fix loop (5x)</text>
  </g>

  <!-- Fail loop -->
  <path d="M542,616 C542,636 180,636 180,616" stroke="#F43F5E" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="360" y="650" text-anchor="middle" font-size="9" fill="#F43F5E">fail → auto-fix → re-run (max 5x)</text>

  <!-- Human Gate 3 -->
  <line x1="450" y1="642" x2="450" y2="664" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="310" y="668" width="280" height="36" rx="18" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="450" y="691" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Human Gate — approve implementation</text>
  </g>

  <!-- /pr and Learning -->
  <line x1="380" y1="704" x2="300" y2="720" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="520" y1="704" x2="600" y2="720" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="210" y="718" width="140" height="40" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
    <rect x="210" y="718" width="4" height="40" rx="2" fill="#F97316"/>
    <text x="280" y="743" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">/pr</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="718" width="160" height="40" rx="12" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
    <rect x="560" y="718" width="4" height="40" rx="2" fill="#64748B"/>
    <text x="640" y="743" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">Learning Loop</text>
  </g>
</svg>