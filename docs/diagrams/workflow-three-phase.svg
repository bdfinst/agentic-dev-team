<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#F43F5E"/>
    </marker>
  </defs>

  <!-- User Request + Orchestrator (compact top) -->
  <g filter="url(#shadow)">
    <rect x="370" y="6" width="160" height="32" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="450" y="27" text-anchor="middle" font-size="12" font-weight="500" fill="#475569">User Request</text>
  </g>
  <line x1="450" y1="38" x2="450" y2="48" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="370" y="52" width="160" height="36" rx="12" fill="#6366F1" stroke="#4F46E5" stroke-width="1"/>
    <text x="450" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#FFF">Orchestrator</text>
  </g>
  <line x1="450" y1="88" x2="450" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 1: RESEARCH ===== -->
  <rect x="20" y="104" width="860" height="82" rx="14" fill="#F5F3FF" fill-opacity="0.5" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="120" font-size="10" font-weight="700" fill="#7C3AED" letter-spacing="0.5">PHASE 1 — RESEARCH</text>

  <g filter="url(#shadow)">
    <rect x="260" y="128" width="170" height="42" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="260" y="128" width="4" height="42" rx="2" fill="#8B5CF6"/>
    <text x="345" y="147" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">/specs</text>
    <text x="345" y="162" text-anchor="middle" font-size="9" fill="#64748B">Intent · BDD · Architecture · Criteria</text>
  </g>
  <line x1="430" y1="149" x2="458" y2="149" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="462" y="128" width="170" height="42" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="462" y="128" width="4" height="42" rx="2" fill="#8B5CF6"/>
    <text x="547" y="147" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Design Doc</text>
    <text x="547" y="162" text-anchor="middle" font-size="9" fill="#64748B">docs/specs/</text>
  </g>

  <!-- Human Gate 1 -->
  <line x1="450" y1="186" x2="450" y2="198" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="310" y="202" width="280" height="30" rx="15" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="450" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Human Gate — approve spec + design</text>
  </g>
  <line x1="450" y1="232" x2="450" y2="244" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 2: PLAN ===== -->
  <rect x="20" y="248" width="860" height="120" rx="14" fill="#EFF6FF" fill-opacity="0.4" stroke="#3B82F6" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="264" font-size="10" font-weight="700" fill="#2563EB" letter-spacing="0.5">PHASE 2 — PLAN</text>

  <!-- /plan -->
  <g filter="url(#shadow)">
    <rect x="40" y="274" width="140" height="38" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="40" y="274" width="4" height="38" rx="2" fill="#3B82F6"/>
    <text x="110" y="291" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">/plan</text>
    <text x="110" y="304" text-anchor="middle" font-size="9" fill="#64748B">TDD steps</text>
  </g>
  <line x1="180" y1="293" x2="204" y2="293" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Plan Review Personas (4 in parallel) -->
  <g filter="url(#shadow)">
    <rect x="208" y="274" width="126" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="271" y="289" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">Acceptance Critic</text>
    <text x="271" y="301" text-anchor="middle" font-size="8" fill="#3B82F6">criteria · scenarios</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="342" y="274" width="126" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="405" y="289" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">Design Critic</text>
    <text x="405" y="301" text-anchor="middle" font-size="8" fill="#3B82F6">coupling · patterns</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="476" y="274" width="126" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="539" y="289" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">UX Critic</text>
    <text x="539" y="301" text-anchor="middle" font-size="8" fill="#3B82F6">journey · a11y</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="610" y="274" width="126" height="34" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="673" y="289" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">Strategic Critic</text>
    <text x="673" y="301" text-anchor="middle" font-size="8" fill="#3B82F6">scope · risk</text>
  </g>

  <!-- Converge to aggregate -->
  <line x1="271" y1="308" x2="420" y2="330" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="405" y1="308" x2="420" y2="330" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="539" y1="308" x2="470" y2="330" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="673" y1="308" x2="470" y2="330" stroke="#CBD5E1" stroke-width="1"/>

  <g filter="url(#shadow)">
    <rect x="370" y="330" width="150" height="28" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
    <text x="445" y="349" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Aggregate Findings</text>
  </g>

  <!-- Human Gate 2 -->
  <line x1="445" y1="358" x2="445" y2="374" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="310" y="378" width="280" height="30" rx="15" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="450" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Human Gate — approve plan</text>
  </g>
  <line x1="450" y1="408" x2="450" y2="420" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 3: IMPLEMENT ===== -->
  <rect x="20" y="424" width="860" height="90" rx="14" fill="#ECFDF5" fill-opacity="0.4" stroke="#10B981" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="440" font-size="10" font-weight="700" fill="#059669" letter-spacing="0.5">PHASE 3 — IMPLEMENT</text>

  <!-- TDD Loop -->
  <g filter="url(#shadow)">
    <rect x="80" y="448" width="150" height="44" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <rect x="80" y="448" width="4" height="44" rx="2" fill="#10B981"/>
    <text x="155" y="466" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">TDD Loop</text>
    <text x="155" y="482" text-anchor="middle" font-size="9">
      <tspan fill="#EF4444" font-weight="600">RED</tspan>
      <tspan fill="#64748B"> → </tspan>
      <tspan fill="#22C55E" font-weight="600">GREEN</tspan>
      <tspan fill="#64748B"> → </tspan>
      <tspan fill="#3B82F6" font-weight="600">REFACTOR</tspan>
    </text>
  </g>
  <line x1="230" y1="470" x2="258" y2="470" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Spec Compliance -->
  <g filter="url(#shadow)">
    <rect x="262" y="448" width="130" height="44" rx="10" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
    <rect x="262" y="448" width="4" height="44" rx="2" fill="#EC4899"/>
    <text x="327" y="466" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Spec Compliance</text>
    <text x="327" y="482" text-anchor="middle" font-size="9" fill="#64748B">Stage 1</text>
  </g>
  <line x1="392" y1="470" x2="418" y2="470" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Quality Agents -->
  <g filter="url(#shadow)">
    <rect x="422" y="448" width="130" height="44" rx="10" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
    <rect x="422" y="448" width="4" height="44" rx="2" fill="#EC4899"/>
    <text x="487" y="466" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Quality Agents</text>
    <text x="487" y="482" text-anchor="middle" font-size="9" fill="#64748B">Stage 2</text>
  </g>
  <line x1="552" y1="470" x2="578" y2="470" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- /code-review -->
  <g filter="url(#shadow)">
    <rect x="582" y="448" width="150" height="44" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <rect x="582" y="448" width="4" height="44" rx="2" fill="#10B981"/>
    <text x="657" y="466" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">/code-review</text>
    <text x="657" y="482" text-anchor="middle" font-size="9" fill="#64748B">auto-fix loop (5x)</text>
  </g>

  <!-- Fail loop -->
  <path d="M487,492 C487,508 155,508 155,492" stroke="#F43F5E" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="320" y="520" text-anchor="middle" font-size="8" fill="#F43F5E">fail → auto-fix → re-run (max 5x)</text>

  <!-- Human Gate 3 -->
  <line x1="450" y1="524" x2="450" y2="540" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="305" y="544" width="290" height="30" rx="15" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="450" y="564" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Human Gate — approve implementation</text>
  </g>

  <!-- /pr and Learning -->
  <line x1="385" y1="574" x2="310" y2="594" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="515" y1="574" x2="590" y2="594" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="220" y="598" width="130" height="36" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
    <rect x="220" y="598" width="4" height="36" rx="2" fill="#F97316"/>
    <text x="285" y="621" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">/pr</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="555" y="598" width="150" height="36" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
    <rect x="555" y="598" width="4" height="36" rx="2" fill="#64748B"/>
    <text x="630" y="621" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">Learning Loop</text>
  </g>
</svg>